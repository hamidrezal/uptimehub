{% extends 'base_dashboard.html' %}

{% block title %}ورود{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">ورود به UptimeHUB</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">برای مدیریت مانیتورها وارد شوید.</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% if form.non_field_errors %}<div class="text-sm text-red-600 bg-red-50 rounded-xl p-3">{{ form.non_field_errors }}</div>{% endif %}
            <div>
                <label class="block text-sm text-gray-700 dark:text-gray-300 mb-2">نام کاربری</label>
                <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username" class="w-full px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm text-gray-700 dark:text-gray-300 mb-2">رمز عبور</label>
                <input type="password" name="password" autocomplete="current-password" required id="id_password" class="w-full px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button class="w-full px-4 py-2 bg-blue-500 text-white rounded-2xl hover:bg-blue-600" type="submit">ورود</button>
        </form>
    </div>
</div>
{% endblock %}
