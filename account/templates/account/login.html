{% extends 'base_dashboard.html' %}

{% block title %}ورود{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-2xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-700 dark:bg-gray-800">

        <h1 class="mb-2 text-2xl font-bold text-gray-900 dark:text-white">
            ورود به UptimeHUB
        </h1>

        <p class="mb-6 text-sm text-gray-600 dark:text-gray-400">
            برای مدیریت مانیتورها وارد شوید.
        </p>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            {% if form.non_field_errors %}
            <div class="rounded-xl border border-red-200 bg-red-50 p-3 text-sm text-red-700 dark:border-red-900 dark:bg-red-950/40 dark:text-red-300">
                {{ form.non_field_errors }}
            </div>
            {% endif %}

            <div>
                <label for="id_username" class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">
                    نام کاربری
                </label>
                <input
                    id="id_username"
                    type="text"
                    name="username"
                    maxlength="150"
                    autocomplete="username"
                    autofocus
                    required
                    class="block w-full rounded-xl border border-gray-300 bg-white px-4 py-2.5 text-gray-900 placeholder-gray-400 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
                >
            </div>

            <div>
                <label for="id_password" class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">
                    رمز عبور
                </label>
                <input
                    id="id_password"
                    type="password"
                    name="password"
                    autocomplete="current-password"
                    required
                    class="block w-full rounded-xl border border-gray-300 bg-white px-4 py-2.5 text-gray-900 placeholder-gray-400 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
                >
            </div>

            <button
                type="submit"
                class="w-full rounded-xl bg-blue-600 px-4 py-2.5 font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800"
            >
                ورود
            </button>
        </form>

    </div>
</div>
{% endblock %}
