{% extends 'base_dashboard.html' %}
{% load static %}

{% block title %}حذف سرور{% endblock %}

{% block content %}
<main class="min-h-[calc(100vh-80px)] flex items-center justify-center px-4 py-16 animate-slideIn">

    <section class="w-full max-w-md bg-navy-700 border border-navy-600 rounded-xl p-6 text-center">

        <div class="relative w-16 h-16 mx-auto mb-5">
            <div class="absolute inset-0 rounded-full bg-crimson/10 border border-crimson/30"></div>
            <div class="absolute inset-2 rounded-full bg-crimson/15 flex items-center justify-center">
                <i class="fas fa-exclamation-triangle text-crimson text-2xl"></i>
            </div>
        </div>

        <h1 class="text-xl font-bold text-white mb-2">حذف سرور</h1>

        <p class="text-slate2 text-sm leading-7 mb-3">
            آیا از حذف سرور
            <strong class="text-white font-bold">{{ server.name }}</strong>
            اطمینان دارید؟
        </p>

        <div class="bg-navy-800 border border-navy-600 rounded-xl px-4 py-3 mb-6">
            <p class="text-xs text-slate2 leading-6">
                <i class="fas fa-info-circle text-amber ml-1"></i>
                این عمل غیرقابل بازگشت است و اطلاعات مانیتورینگ این سرور حذف می‌شود.
            </p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="flex items-center justify-center gap-3">
                <button type="submit"
                        class="px-6 py-2.5 bg-crimson hover:bg-red-500 text-white rounded-xl text-sm font-bold transition-colors flex items-center gap-2">
                    <i class="fas fa-trash-alt text-xs"></i>
                    حذف سرور
                </button>

                <a href="{% url 'monitor:server_list' %}"
                   class="px-6 py-2.5 bg-navy-600 hover:bg-navy-500 text-slate2 hover:text-white border border-navy-500 rounded-xl text-sm font-bold transition-colors flex items-center gap-2">
                    <i class="fas fa-times text-xs"></i>
                    انصراف
                </a>
            </div>
        </form>

    </section>

</main>
{% endblock %}
