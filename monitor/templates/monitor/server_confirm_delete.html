{% extends 'base_dashboard.html' %}
{% load static %}

{% block title %}حذف سرور{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 p-6 text-center shadow-sm">
        <div class="w-16 h-16 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-exclamation-triangle text-red-500 text-2xl"></i>
        </div>

        <h1 class="text-xl font-bold text-gray-900 dark:text-white mb-2">حذف سرور</h1>

        <p class="text-gray-500 dark:text-gray-400 mb-4">
            آیا از حذف سرور <strong class="text-gray-900 dark:text-white">{{ server.name }}</strong> اطمینان دارید؟
        </p>

        <p class="text-sm text-gray-400 dark:text-gray-500 mb-6">
            <i class="fas fa-info-circle ml-1"></i>
            این عمل غیرقابل بازگشت است.
        </p>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="flex gap-3 justify-center">
                <button type="submit" class="px-6 py-2 bg-red-500 text-white rounded-2xl hover:bg-red-600 transition">
                    <i class="fas fa-trash-alt ml-1"></i>
                    حذف
                </button>
                
                <a href="{% url 'monitor:server_list' %}" class="px-6 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-2xl hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                    <i class="fas fa-times ml-1"></i>
                    انصراف
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
