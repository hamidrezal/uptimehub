{% extends 'base_dashboard.html' %}
{% load static %}
{% block title %}داشبورد{% endblock %}
{% block content %}
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- ========== هدر ========== -->
        <div class="mb-8">
            <div class="flex justify-between items-center flex-wrap gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
                        <i class="fas fa-heartbeat text-blue-500 ml-2"></i>
                        UptimeHUB
                    </h1>
                    <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">داشبورد لحظه‌ای مانیتورینگ</p>
                </div>

                <div class="flex items-center gap-3">
                    <div class="text-left">
                        <div class="text-xs text-gray-400">آخرین بروزرسانی</div>
                        <div class="text-sm font-medium text-gray-700 dark:text-gray-300" id="lastUpdateTime">--:--:--</div>
                    </div>

                    <button id="darkModeToggle" class="px-3 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:inline"></i>
                    </button>

                    <button id="refreshBtn" class="px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm flex items-center gap-2">
                        <i class="fas fa-sync-alt text-gray-400 text-xs" id="refreshIcon"></i>
                        بروزرسانی
                    </button>
                    <a href="{% url 'monitor:server_list' %}">
                        <button class="px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm flex items-center gap-2">
                        <i class="fas fa-sync-alt text-gray-400 text-xs" id="refreshIcon"></i>
                        افزودن سرور
                    </button>
                    </a>
                </div>
            </div>
        </div>


        <div id="statsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
            <!-- اسکلتون آماری -->
            <div class="bg-white dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700 p-5">
                <div class="animate-pulse flex justify-between">
                    <div><div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-20 mb-2"></div><div class="h-8 bg-gray-200 dark:bg-gray-700 rounded w-12"></div></div>
                    <div class="w-12 h-12 bg-gray-200 dark:bg-gray-700 rounded-2xl"></div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700 p-5">
                <div class="animate-pulse flex justify-between">
                    <div><div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-20 mb-2"></div><div class="h-8 bg-gray-200 dark:bg-gray-700 rounded w-12"></div></div>
                    <div class="w-12 h-12 bg-gray-200 dark:bg-gray-700 rounded-2xl"></div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700 p-5">
                <div class="animate-pulse flex justify-between">
                    <div><div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-20 mb-2"></div><div class="h-8 bg-gray-200 dark:bg-gray-700 rounded w-12"></div></div>
                    <div class="w-12 h-12 bg-gray-200 dark:bg-gray-700 rounded-2xl"></div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700 p-5">
                <div class="animate-pulse flex justify-between">
                    <div><div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-20 mb-2"></div><div class="h-8 bg-gray-200 dark:bg-gray-700 rounded w-12"></div></div>
                    <div class="w-12 h-12 bg-gray-200 dark:bg-gray-700 rounded-2xl"></div>
                </div>
            </div>
        </div>

        <div class="flex gap-3 mb-6 border-b border-gray-200 dark:border-gray-700">
            <button onclick="setFilter('all')" class="filter-tab px-5 py-2.5 text-sm font-medium rounded-t-2xl active" data-filter="all">
                <i class="fas fa-th-large ml-1 text-xs"></i> همه <span id="filterAllCount" class="mr-1 text-gray-400 text-xs">(0)</span>
            </button>
            <button onclick="setFilter('up')" class="filter-tab px-5 py-2.5 text-sm font-medium rounded-t-2xl" data-filter="up">
                <i class="fas fa-check-circle ml-1 text-xs text-green-500"></i> فعال <span id="filterUpCount" class="mr-1 text-gray-400 text-xs">(0)</span>
            </button>
            <button onclick="setFilter('down')" class="filter-tab px-5 py-2.5 text-sm font-medium rounded-t-2xl" data-filter="down">
                <i class="fas fa-exclamation-circle ml-1 text-xs text-red-500"></i> غیرفعال <span id="filterDownCount" class="mr-1 text-gray-400 text-xs">(0)</span>
            </button>
        </div>

        <div id="serversContainer" class="space-y-3">
            <!-- اسکلتون -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 p-5">
                <div class="animate-pulse flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gray-200 dark:bg-gray-700 rounded-2xl"></div>
                        <div><div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-32 mb-2"></div><div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-48"></div></div>
                    </div>
                    <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded-full w-20"></div>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center text-gray-400 dark:text-gray-600 text-xs border-t border-gray-200 dark:border-gray-800 pt-6">
            <i class="fas fa-shield-alt ml-1"></i>UptimeHUB
        </div>

    </div>
{% endblock %}



{% block js %}
	 <script src="{% static 'js/main.js' %}"></script>
{% endblock %}
