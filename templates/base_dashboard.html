<!DOCTYPE html>
<html lang="fa" dir="rtl">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UptimeHUB | {% block title %}{% endblock %}</title>

    <script src="{% static 'js/tailwindcss.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <script src="{% static 'js/axios.min.js' %}"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        navy: {
                            DEFAULT: '#0A0F1E',
                            800: '#0D1525',
                            700: '#111B2E',
                            600: '#1A2540',
                            500: '#1E2A3B'
                        },
                        teal: {
                            DEFAULT: '#00D4AA',
                            400: '#00E8BC',
                            600: '#00B891'
                        },
                        amber: {
                            DEFAULT: '#F59E0B'
                        },
                        crimson: {
                            DEFAULT: '#EF4444'
                        },
                        slate2: {
                            DEFAULT: '#8899BB',
                            light: '#AAB8CC'
                        }
                    },
                    borderRadius: {
                        xl: '1rem',
                        '2xl': '1.5rem',
                        '3xl': '2rem'
                    },
                    fontFamily: {
                        sans: ['Vazir', 'Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    animation: {
                        pulse2: 'pulse2 2s ease-in-out infinite',
                        slideIn: 'slideIn 0.4s ease-out',
                        ping2: 'ping2 2s ease-out infinite'
                    },
                    keyframes: {
                        pulse2: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.5' }
                        },
                        slideIn: {
                            from: { opacity: '0', transform: 'translateY(8px)' },
                            to: { opacity: '1', transform: 'translateY(0)' }
                        },
                        ping2: {
                            '75%, 100%': { transform: 'scale(2)', opacity: '0' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: #0A0F1E;
            color: #fff;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #0D1525;
        }

        ::-webkit-scrollbar-thumb {
            background: #1E2A3B;
            border-radius: 999px;
        }

        .uptime-card {
            background: #111B2E;
            border: 1px solid #1A2540;
            border-radius: 1rem;
        }

        .uptime-card-soft {
            background: rgba(17, 27, 46, 0.75);
            border: 1px solid rgba(26, 37, 64, 0.9);
            backdrop-filter: blur(14px);
            border-radius: 1rem;
        }

        .dot-live::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            background: #00D4AA;
            animation: ping2 2s ease-out infinite;
        }

        .heartbeat-path {
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
            animation: draw 3s ease forwards infinite;
        }

        @keyframes draw {
            0% {
                stroke-dashoffset: 400;
                opacity: 0.3;
            }
            60% {
                stroke-dashoffset: 0;
                opacity: 1;
            }
            100% {
                stroke-dashoffset: 0;
                opacity: 0.6;
            }
        }

        .ring-progress {
            stroke-dasharray: 339.29;
            stroke-dashoffset: calc(339.29 * (1 - var(--pct)));
            transition: stroke-dashoffset 1s ease;
        }
    </style>

    {% block style %}{% endblock %}
</head>

<body class="font-sans bg-navy text-white min-h-screen antialiased selection:bg-teal selection:text-navy">

    {% block content %}{% endblock %}

    {% block js %}{% endblock %}
</body>
</html>
